<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dean | Multimedia Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: {
                            dark: '#0B0E14',
                            teal: '#1CE5E5',
                            green: '#D2F388'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0E14; color: #E2E8F0; z-index: 0; }
        .glass-nav {
            background: rgba(11, 14, 20, 0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(28, 229, 229, 0.3);
        }
        .text-glow { text-shadow: 0 0 25px rgba(28, 229, 229, 0.5); }
        .bg-glow-teal {
            position: absolute; width: 60vw; height: 60vw; max-width: 600px; max-height: 600px;
            background: radial-gradient(circle, rgba(28,229,229,0.1) 0%, rgba(11,14,20,0) 70%);
            top: -10%; left: -10%; z-index: -1; pointer-events: none;
        }
        .bg-glow-green {
            position: absolute; width: 50vw; height: 50vw; max-width: 500px; max-height: 500px;
            background: radial-gradient(circle, rgba(210,243,136,0.08) 0%, rgba(11,14,20,0) 70%);
            bottom: -10%; right: -10%; z-index: -1; pointer-events: none;
        }
    </style>
</head>
<body class="antialiased relative min-h-screen flex flex-col overflow-x-hidden font-sans">
    
    <div class="bg-glow-teal"></div>
    <div class="bg-glow-green"></div>

    <nav class="glass-nav fixed w-full top-0 z-50 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-wider text-white flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-brand-teal animate-pulse"></span>
                DEAN<span class="text-brand-teal">.</span>
            </a>
            <div class="space-x-8 text-sm font-semibold tracking-wide">
                <a href="index.html" class="text-brand-teal transition-colors">Home</a>
                <a href="rotoscoping.html" class="text-gray-400 hover:text-white transition-colors">Rotoscoping</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <div class="inline-block px-4 py-1.5 mb-6 rounded-full border border-brand-teal/30 bg-brand-teal/5 text-brand-teal text-xs font-bold uppercase tracking-widest">
                Multimedia & Authoring
            </div>
            <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-6 leading-tight tracking-tight">
                Crafting Motion <br />
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-teal to-brand-green text-glow">
                    Through Code & Art.
                </span>
            </h1>
            <p class="text-lg md:text-xl text-gray-400 mb-10 max-w-2xl mx-auto font-light leading-relaxed">
                Showcasing the intersection of technical precision and creative direction. Explore my comprehensive journey through rotoscoping and digital authoring.
            </p>
            
            <a href="rotoscoping.html" class="inline-flex items-center justify-center gap-3 px-8 py-4 bg-brand-teal text-brand-dark font-bold rounded-lg hover:bg-brand-green transition-all duration-300 transform hover:scale-105 shadow-[0_0_20px_rgba(28,229,229,0.3)]">
                View Rotoscoping Progress
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </a>
        </div>
    </main>

</body>
</html>
