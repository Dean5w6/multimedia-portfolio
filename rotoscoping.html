<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotoscoping Progress | Dean</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="styles.css">
    
    <script src="navbar.js" defer></script>
</head>
<body class="antialiased relative min-h-screen flex flex-col overflow-x-hidden font-sans">
    
    <portfolio-nav></portfolio-nav>

    <main class="flex-grow pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto">
            
            <div class="mb-12 text-center">
                <div class="inline-flex items-center gap-3 mb-4">
                    <span class="w-6 h-[1px] bg-brand-accent"></span>
                    <span class="text-brand-accent text-xs font-bold uppercase tracking-widest">Phase 1</span>
                    <span class="w-6 h-[1px] bg-brand-accent"></span>
                </div>
                <h2 class="text-4xl md:text-5xl font-bold text-brand-ink mb-4 tracking-tight">Rotoscoping <span class="italic font-light text-gray-500">Progress.</span></h2>
                <p class="text-gray-600 font-light max-w-2xl mx-auto leading-relaxed">
                    The raw video reference serving as the foundation for the upcoming frame-by-frame authoring workload.
                </p>
            </div>

            <div class="premium-card p-4 md:p-8">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-brand-ink tracking-wide">Reference Footage</h3>
                    <span class="px-3 py-1 bg-brand-accent/10 text-brand-accent text-xs font-bold rounded uppercase tracking-widest">Source</span>
                </div>
                
                <div class="video-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/Nj-bAlQWs1I" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
